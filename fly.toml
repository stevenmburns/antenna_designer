# fly.toml app configuration file generated for antennaknobs on 2026-06-27T19:43:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'antennaknobs'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'
